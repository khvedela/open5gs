name: Live migration image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/live-migration-image.yml"
      - "docker/live-migration/**"
      - "lib/**"
      - "src/**"
      - "configs/**"
      - "subprojects/**"
      - "meson.build"
      - "meson_options.txt"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: live-migration-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and publish Open5GS live migration image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::9}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/live-migration/Dockerfile
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=open5gs-live-migration
          cache-to: type=gha,mode=max,scope=open5gs-live-migration
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/open5gs-live-migration:${{ steps.vars.outputs.short_sha }}
            ghcr.io/${{ github.repository_owner }}/open5gs-live-migration:main
