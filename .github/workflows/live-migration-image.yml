name: Live migration image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/live-migration-image.yml"
      - "docker/live-migration/**"
      - "lib/**"
      - "src/**"
      - "configs/**"
      - "subprojects/**"
      - "meson.build"
      - "meson_options.txt"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: live-migration-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/open5gs-live-migration

jobs:
  build:
    name: Build Open5GS live migration image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/live-migration/Dockerfile
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=open5gs-live-migration-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=open5gs-live-migration-${{ matrix.arch }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export image digest
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${IMAGE_DIGEST#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish multi-architecture image manifest
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Download image digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: image-digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and verify image manifest
        env:
          COMMIT_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          GIT_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          cd /tmp/digests

          sources=()
          for digest in *; do
            sources+=("${REGISTRY_IMAGE}@sha256:${digest}")
          done

          tags=(--tag "${REGISTRY_IMAGE}:${COMMIT_SHA}")
          if [[ "${EVENT_NAME}" == "push" && "${GIT_REF}" == "refs/heads/main" ]]; then
            short_sha="${COMMIT_SHA:0:9}"
            tags+=(--tag "${REGISTRY_IMAGE}:${short_sha}")
            tags+=(--tag "${REGISTRY_IMAGE}:main")
          fi

          docker buildx imagetools create "${tags[@]}" "${sources[@]}"

          docker buildx imagetools inspect \
            --raw "${REGISTRY_IMAGE}:${COMMIT_SHA}" | \
            jq -e '[.manifests[].platform | select(.os == "linux") | .os + "/" + .architecture] | sort == ["linux/amd64", "linux/arm64"]'

          manifest_digest=$(docker buildx imagetools inspect \
            "${REGISTRY_IMAGE}:${COMMIT_SHA}" | awk '/^Digest:/ {print $2; exit}')
          {
            echo "### Open5GS live-migration image"
            echo
            echo "- Commit: \`${COMMIT_SHA}\`"
            echo "- Candidate: \`${REGISTRY_IMAGE}:${COMMIT_SHA}\`"
            echo "- Digest: \`${manifest_digest}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
